<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BkTowers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1f4d,#163b86);
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  width:100%;
  max-width:420px;
  background:#fff;
  padding:35px;
  border-radius:18px;
  box-shadow:0 20px 45px rgba(0,0,0,.2);
  text-align:center;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#0b1f4d;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#0b1f4d;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.msg{
  margin-top:10px;
  color:red;
}
</style>
</head>

<body>

<div class="login-box">
  <div class="title">BkTowers</div>

  <input type="text" id="loginValue" placeholder="البريد الإلكتروني أو اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">تسجيل الدخول</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDey3KL3qZUvZBVtFcB38xzBGx6qrG2WYY",
  authDomain: "bktowers-4b822.firebaseapp.com",
  projectId: "bktowers-4b822",
  storageBucket: "bktowers-4b822.firebasestorage.app",
  messagingSenderId: "336608827796",
  appId: "1:336608827796:web:4957fe0d411220f6a69781"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function isEmail(v){return v.includes("@")}

async function findUser(username){
  const q=query(collection(db,"users"),where("username","==",username.toLowerCase()));
  const snap=await getDocs(q);
  if(snap.empty)return null;
  return snap.docs[0].data();
}

window.login=async function(){
  const val=document.getElementById("loginValue").value.trim();
  const pass=document.getElementById("password").value.trim();
  const msg=document.getElementById("msg");

  msg.innerText="";

  try{
    let email=val;

    if(!isEmail(val)){
      const user=await findUser(val);
      if(!user){
        msg.innerText="اسم المستخدم غير موجود";
        return;
      }
      email=user.email;
    }

    const cred=await signInWithEmailAndPassword(auth,email,pass);

    const snap=await getDoc(doc(db,"users",cred.user.uid));

    if(!snap.exists()){
      msg.innerText="بيانات المستخدم غير موجودة";
      return;
    }

    const data=snap.data();

    if(data.role==="admin"){
      window.location.href="dashboard.html";
    }else{
      window.location.href="employee-dashboard.html";
    }

  }catch(e){
    msg.innerText="بيانات الدخول غير صحيحة";
  }
};
</script>

</body>
</html>
