<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BkTowers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0a1f44, #1e3c72);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }

    h1 {
      color: #0a1f44;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0a1f44;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>BkTowers</h1>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Login</button>
  </div>

</body>
</html>
