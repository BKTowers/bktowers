<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>BkTowers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1f4d, #163b86);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      padding: 36px 28px;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.20);
      text-align: center;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      color: #0b1f4d;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 26px;
      font-weight: 700;
    }

    .form-group {
      text-align: right;
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #1f2937;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #d7deea;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      color: #111827;
      outline: none;
      transition: 0.2s ease;
    }

    .form-group input:focus {
      border-color: #0b1f4d;
      box-shadow: 0 0 0 3px rgba(11, 31, 77, 0.08);
    }

    .password-wrap {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: #0b1f4d;
      width: auto;
      padding: 4px 6px;
      margin: 0;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: #0b1f4d;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      transition: 0.2s ease;
      margin-top: 4px;
    }

    .login-btn:hover {
      background: #163b86;
    }

    .msg {
      margin-top: 14px;
      font-size: 14px;
      min-height: 22px;
      font-weight: 700;
      color: #b91c1c;
      line-height: 1.7;
      text-align: right;
    }

    .msg.success {
      color: #166534;
    }

    .hint {
      margin-top: 18px;
      background: #f8fbff;
      border: 1px dashed #d7deea;
      border-radius: 14px;
      padding: 12px;
      text-align: right;
      font-size: 13px;
      line-height: 1.8;
      color: #4b5563;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="title">BkTowers</div>
    <div class="subtitle">تسجيل الدخول إلى النظام</div>

    <div class="form-group">
      <label for="loginValue">البريد الإلكتروني أو اسم المستخدم</label>
      <input type="text" id="loginValue" placeholder="اكتب البريد الإلكتروني أو اسم المستخدم" />
    </div>

    <div class="form-group">
      <label for="password">كلمة المرور</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="اكتب كلمة المرور" />
        <button type="button" class="toggle-password" onclick="togglePassword()">إظهار</button>
      </div>
    </div>

    <button class="login-btn" onclick="login()">تسجيل الدخول</button>

    <div class="msg" id="msg"></div>

    <div class="hint">
      هذه النسخة تعرض سبب الخطأ الحقيقي.
      <br />
      يمكنك الدخول بالبريد الإلكتروني أو باسم المستخدم.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDey3KL3qZUvZBVtFcB38xzBGx6qrG2WYY",
      authDomain: "bktowers-4b822.firebaseapp.com",
      projectId: "bktowers-4b822",
      storageBucket: "bktowers-4b822.firebasestorage.app",
      messagingSenderId: "336608827796",
      appId: "1:336608827796:web:4957fe0d411220f6a69781"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function setMessage(text, type = "error") {
      const msg = document.getElementById("msg");
      msg.className = "msg";
      if (type === "success") msg.classList.add("success");
      msg.innerText = text;
    }

    function isEmail(value) {
      return String(value || "").includes("@");
    }

    function normalizeUsername(value) {
      return String(value || "").trim().toLowerCase();
    }

    async function findUserByUsername(username) {
      const q = query(
        collection(db, "users"),
        where("username", "==", normalizeUsername(username))
      );
      const snapshot = await getDocs(q);

      if (snapshot.empty) return null;

      return {
        id: snapshot.docs[0].id,
        data: snapshot.docs[0].data()
      };
    }

    async function ensureAdminDocIfMissing(user) {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);

      if (!snap.exists()) {
        await setDoc(userRef, {
          name: "المدير الرئيسي",
          nationalId: "",
          username: "admin",
          email: user.email || "",
          role: "admin",
          active: true,
          createdAt: serverTimestamp()
        });

        return await getDoc(userRef);
      }

      return snap;
    }

    function redirectByRole(role) {
      if (role === "admin") {
        window.location.href = "dashboard.html";
      } else {
        window.location.href = "employee-dashboard.html";
      }
    }

    function explainFirebaseError(error) {
      const code = error?.code || "";

      if (code === "auth/invalid-credential") {
        return "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
      }

      if (code === "auth/wrong-password") {
        return "كلمة المرور غير صحيحة.";
      }

      if (code === "auth/user-not-found") {
        return "الحساب غير موجود في Firebase Authentication.";
      }

      if (code === "auth/too-many-requests") {
        return "تمت محاولات كثيرة. حاول بعد قليل.";
      }

      if (code === "permission-denied" || code === "firestore/permission-denied") {
        return "قراءة users مرفوضة من Firestore Rules.";
      }

      return `${code || "خطأ غير معروف"}${error?.message ? " - " + error.message : ""}`;
    }

    window.login = async function () {
      const loginValue = document.getElementById("loginValue").value.trim();
      const password = document.getElementById("password").value.trim();

      setMessage("");

      if (!loginValue || !password) {
        setMessage("أدخل البريد الإلكتروني أو اسم المستخدم مع كلمة المرور.");
        return;
      }

      try {
        let emailToLogin = "";
        let lookedUpUser = null;

        if (isEmail(loginValue)) {
          emailToLogin = loginValue;
        } else {
          try {
            lookedUpUser = await findUserByUsername(loginValue);
          } catch (lookupError) {
            setMessage("فشل البحث باسم المستخدم داخل users: " + explainFirebaseError(lookupError));
            return;
          }

          if (!lookedUpUser) {
            setMessage("اسم المستخدم غير موجود داخل users.");
            return;
          }

          if (!lookedUpUser.data.active) {
            setMessage("هذا الحساب غير مفعل.");
            return;
          }

          emailToLogin = lookedUpUser.data.email || "";

          if (!emailToLogin) {
            setMessage("اسم المستخدم موجود، لكن لا يوجد له بريد إلكتروني محفوظ داخل users.");
            return;
          }
        }

        let userCredential;
        try {
          userCredential = await signInWithEmailAndPassword(auth, emailToLogin, password);
        } catch (authError) {
          setMessage("فشل تسجيل الدخول في Auth: " + explainFirebaseError(authError));
          return;
        }

        const user = userCredential.user;

        let userSnap;
        try {
          userSnap = await getDoc(doc(db, "users", user.uid));
        } catch (docError) {
          setMessage("تم الدخول إلى Auth لكن فشل قراءة users/" + user.uid + ": " + explainFirebaseError(docError));
          await signOut(auth).catch(() => {});
          return;
        }

        if (!userSnap.exists()) {
          if (isEmail(loginValue)) {
            try {
              userSnap = await ensureAdminDocIfMissing(user);
            } catch (adminError) {
              setMessage("تم الدخول إلى Auth لكن فشل إنشاء/قراءة مستند الأدمن: " + explainFirebaseError(adminError));
              await signOut(auth).catch(() => {});
              return;
            }
          }
        }

        if (!userSnap.exists()) {
          setMessage("تم الدخول إلى Auth لكن لا يوجد document للمستخدم داخل users بنفس uid.");
          await signOut(auth).catch(() => {});
          return;
        }

        const userData = userSnap.data();

        if (!userData.active) {
          setMessage("هذا الحساب غير مفعل داخل users.");
          await signOut(auth).catch(() => {});
          return;
        }

        localStorage.setItem("userUid", user.uid);
        localStorage.setItem("userName", userData.name || "");
        localStorage.setItem("userEmail", userData.email || user.email || "");
        localStorage.setItem("userRole", userData.role || "employee");
        localStorage.setItem("username", userData.username || "");

        setMessage("تم تسجيل الدخول بنجاح.", "success");
        redirectByRole(userData.role || "employee");

      } catch (error) {
        setMessage("خطأ عام: " + explainFirebaseError(error));
      }
    };

    window.togglePassword = function () {
      const passwordInput = document.getElementById("password");
      const toggleBtn = document.querySelector(".toggle-password");

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleBtn.innerText = "إخفاء";
      } else {
        passwordInput.type = "password";
        toggleBtn.innerText = "إظهار";
      }
    };

    document.getElementById("loginValue").addEventListener("keydown", function (event) {
      if (event.key === "Enter") login();
    });

    document.getElementById("password").addEventListener("keydown", function (event) {
      if (event.key === "Enter") login();
    });
  </script>
</body>
</html>
