<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BkTowers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a1f44, #1e3c72);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      background: #fff;
      padding: 35px 25px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      color: #0a1f44;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0a1f44;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #163a75;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="title">BkTowers</div>

    <input type="email" id="email" value="bktowers0@gmail.com">
    <input type="password" id="password" value="010096">

    <button onclick="login()">Login</button>

    <div class="msg" id="msg"></div>
  </div>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDey3KL3qZUvZBVtFcB38xzBGx6qrG2WYY",
      authDomain: "bktowers-4b822.firebaseapp.com",
      projectId: "bktowers-4b822",
      storageBucket: "bktowers-4b822.firebasestorage.app",
      messagingSenderId: "336608827796",
      appId: "1:336608827796:web:4957fe0d411220f6a69781"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.login = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      msg.innerText = "";

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        // إنشاء المستخدم تلقائيًا لو مش موجود
        if (!userSnap.exists()) {
          await setDoc(userRef, {
            name: "Main Admin",
            email: user.email,
            role: "admin",
            active: true,
            createdAt: serverTimestamp()
          });
        }

        // حفظ البيانات
        localStorage.setItem("uid", user.uid);
        localStorage.setItem("email", user.email);

        // تحويل
        window.location.href = "dashboard.html";

      } catch (error) {
        msg.innerText = error.message;
      }
    };

  </script>

</body>
</html>
