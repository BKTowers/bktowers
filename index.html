<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>BkTowers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1f4d, #163b86);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      background: #fff;
      padding: 36px 28px;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.20);
      text-align: center;
    }
    .title {
      font-size: 34px;
      font-weight: 800;
      color: #0b1f4d;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 26px;
      font-weight: 700;
    }
    .form-group {
      text-align: right;
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #1f2937;
    }
    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #d7deea;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      color: #111827;
      outline: none;
    }
    .form-group input:focus {
      border-color: #0b1f4d;
      box-shadow: 0 0 0 3px rgba(11,31,77,0.08);
    }
    button {
      width: 100%;
      padding: 13px;
      background: #0b1f4d;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      margin-top: 4px;
    }
    button:hover {
      background: #163b86;
    }
    .msg {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
      font-weight: 700;
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="title">BkTowers</div>
    <div class="subtitle">تسجيل الدخول إلى النظام</div>

    <div class="form-group">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" placeholder="اكتب اسم المستخدم">
    </div>

    <div class="form-group">
      <label for="password">كلمة المرور</label>
      <input type="password" id="password" placeholder="اكتب كلمة المرور">
    </div>

    <button onclick="login()">تسجيل الدخول</button>
    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDey3KL3qZUvZBVtFcB38xzBGx6qrG2WYY",
      authDomain: "bktowers-4b822.firebaseapp.com",
      projectId: "bktowers-4b822",
      storageBucket: "bktowers-4b822.firebasestorage.app",
      messagingSenderId: "336608827796",
      appId: "1:336608827796:web:4957fe0d411220f6a69781"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function setMessage(text, isError = true) {
      const msg = document.getElementById("msg");
      msg.style.color = isError ? "#b91c1c" : "#166534";
      msg.innerText = text;
    }

    window.login = async function () {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      setMessage("");

      if (!username || !password) {
        setMessage("أدخل اسم المستخدم وكلمة المرور.");
        return;
      }

      try {
        const q = query(collection(db, "users"), where("username", "==", username));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          setMessage("اسم المستخدم غير موجود.");
          return;
        }

        const userRecord = snapshot.docs[0];
        const userData = userRecord.data();

        if (!userData.active) {
          setMessage("هذا الحساب غير مفعل.");
          return;
        }

        const userCredential = await signInWithEmailAndPassword(auth, userData.email, password);
        const user = userCredential.user;

        const currentUserRef = doc(db, "users", user.uid);
        const currentUserSnap = await getDoc(currentUserRef);

        if (!currentUserSnap.exists()) {
          setMessage("بيانات المستخدم غير مكتملة داخل النظام.");
          return;
        }

        const currentUser = currentUserSnap.data();

        localStorage.setItem("userUid", user.uid);
        localStorage.setItem("userName", currentUser.name || "");
        localStorage.setItem("userEmail", currentUser.email || "");
        localStorage.setItem("userRole", currentUser.role || "employee");
        localStorage.setItem("username", currentUser.username || "");

        if (currentUser.role === "admin") {
          window.location.href = "dashboard.html";
        } else {
          window.location.href = "clients.html";
        }
      } catch (error) {
        setMessage("بيانات الدخول غير صحيحة.");
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);
      if (!userSnap.exists()) return;

      const userData = userSnap.data();

      localStorage.setItem("userUid", user.uid);
      localStorage.setItem("userName", userData.name || "");
      localStorage.setItem("userEmail", userData.email || "");
      localStorage.setItem("userRole", userData.role || "employee");
      localStorage.setItem("username", userData.username || "");

      if (userData.role === "admin") {
        window.location.href = "dashboard.html";
      } else {
        window.location.href = "clients.html";
      }
    });

    document.getElementById("username").addEventListener("keydown", function (event) {
      if (event.key === "Enter") login();
    });

    document.getElementById("password").addEventListener("keydown", function (event) {
      if (event.key === "Enter") login();
    });
  </script>
</body>
</html>
