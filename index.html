<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BkTowers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1f4d,#163b86);
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  width:100%;
  max-width:420px;
  background:#fff;
  padding:35px;
  border-radius:18px;
  box-shadow:0 20px 45px rgba(0,0,0,.2);
  text-align:center;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#0b1f4d;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  background:#0b1f4d;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.msg{
  margin-top:10px;
  color:red;
  min-height:22px;
}
</style>
</head>

<body>

<div class="login-box">
  <div class="title">BkTowers</div>

  <input type="text" id="loginValue" placeholder="اسم المستخدم أو البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button id="loginBtn" onclick="login()">تسجيل الدخول</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDey3KL3qZUvZBVtFcB38xzBGx6qrG2WYY",
  authDomain: "bktowers-4b822.firebaseapp.com",
  projectId: "bktowers-4b822",
  storageBucket: "bktowers-4b822.firebasestorage.app",
  messagingSenderId: "336608827796",
  appId: "1:336608827796:web:4957fe0d411220f6a69781"
};

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function normalizeValue(value){
  return String(value || "").trim().toLowerCase();
}

function isEmail(value){
  return normalizeValue(value).includes("@");
}

function setMessage(text){
  document.getElementById("msg").innerText = text;
}

function setLoading(isLoading){
  const btn = document.getElementById("loginBtn");
  btn.disabled = isLoading;
  btn.innerText = isLoading ? "جاري الدخول..." : "تسجيل الدخول";
}

async function findUserByUsername(usernameValue){
  const target = normalizeValue(usernameValue);
  const snapshot = await getDocs(collection(db, "users"));

  if(snapshot.empty) return null;

  let found = null;

  snapshot.forEach((docSnap) => {
    if(found) return;

    const data = docSnap.data();
    const username = normalizeValue(data.username);
    const email = normalizeValue(data.email);
    const emailPrefix = email.includes("@") ? email.split("@")[0] : email;

    if(username === target || emailPrefix === target){
      found = {
        id: docSnap.id,
        ...data
      };
    }
  });

  return found;
}

window.login = async function(){
  const loginValue = document.getElementById("loginValue").value.trim();
  const password = document.getElementById("password").value.trim();

  setMessage("");

  if(!loginValue || !password){
    setMessage("اكتب اسم المستخدم أو البريد الإلكتروني وكلمة المرور");
    return;
  }

  try{
    setLoading(true);

    let emailToLogin = "";

    if(isEmail(loginValue)){
      emailToLogin = normalizeValue(loginValue);
    }else{
      const user = await findUserByUsername(loginValue);

      if(!user){
        setMessage("اسم المستخدم غير موجود");
        return;
      }

      if(!user.email){
        setMessage("لا يوجد بريد إلكتروني لهذا المستخدم");
        return;
      }

      emailToLogin = normalizeValue(user.email);
    }

    const cred = await signInWithEmailAndPassword(auth, emailToLogin, password);

    const snapshot = await getDocs(collection(db, "users"));
    let fullUser = null;

    snapshot.forEach((docSnap) => {
      if(fullUser) return;
      const data = docSnap.data();
      if(normalizeValue(data.email) === normalizeValue(cred.user.email)){
        fullUser = {
          id: docSnap.id,
          ...data
        };
      }
    });

    if(!fullUser){
      setMessage("تم تسجيل الدخول لكن لا توجد بيانات مستخدم في users");
      return;
    }

    localStorage.setItem("userId", fullUser.id || "");
    localStorage.setItem("username", fullUser.username || "");
    localStorage.setItem("name", fullUser.name || "");
    localStorage.setItem("role", fullUser.role || "");
    localStorage.setItem("email", fullUser.email || "");

    if(fullUser.role === "admin"){
      window.location.href = "dashboard.html";
    }else{
      window.location.href = "employee-dashboard.html";
    }

  }catch(e){
    console.log("Login error:", e);

    if(e.code === "auth/invalid-credential" || e.code === "auth/wrong-password"){
      setMessage("كلمة المرور غير صحيحة");
    }else if(e.code === "auth/user-not-found"){
      setMessage("الحساب غير موجود");
    }else if(e.code === "auth/invalid-email"){
      setMessage("البريد الإلكتروني غير صالح");
    }else{
      setMessage("تعذر تسجيل الدخول");
    }
  }finally{
    setLoading(false);
  }
};

document.getElementById("loginValue").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});

document.getElementById("password").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});
</script>

</body>
</html>
