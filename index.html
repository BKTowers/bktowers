<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BkTowers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1f4d,#163b86);
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  width:100%;
  max-width:420px;
  background:#fff;
  padding:35px;
  border-radius:18px;
  box-shadow:0 20px 45px rgba(0,0,0,.2);
  text-align:center;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#0b1f4d;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#0b1f4d;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.msg{
  margin-top:10px;
  color:red;
  min-height:24px;
}
</style>
</head>

<body>

<div class="login-box">
  <div class="title">BkTowers</div>

  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">تسجيل الدخول</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDey3KL3qZUvZBVtFcB38xzBGx6qrG2WYY",
  authDomain: "bktowers-4b822.firebaseapp.com",
  projectId: "bktowers-4b822",
  storageBucket: "bktowers-4b822.firebasestorage.app",
  messagingSenderId: "336608827796",
  appId: "1:336608827796:web:4957fe0d411220f6a69781"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function findUser(username){
  const usersRef = collection(db, "users");

  // Try exact username first
  let q = query(usersRef, where("username", "==", username));
  let snap = await getDocs(q);

  if (!snap.empty) {
    return { id: snap.docs[0].id, ...snap.docs[0].data() };
  }

  // Try lowercase as fallback
  q = query(usersRef, where("username", "==", username.toLowerCase()));
  snap = await getDocs(q);

  if (!snap.empty) {
    return { id: snap.docs[0].id, ...snap.docs[0].data() };
  }

  return null;
}

window.login = async function(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if(!username || !password){
    msg.innerText = "اكتب اسم المستخدم وكلمة المرور";
    return;
  }

  try{
    const user = await findUser(username);

    if(!user){
      msg.innerText = "اسم المستخدم غير موجود داخل users";
      return;
    }

    if(!user.email){
      msg.innerText = "هذا المستخدم لا يحتوي على email داخل users";
      return;
    }

    await signInWithEmailAndPassword(auth, user.email, password);

    localStorage.setItem("userId", user.id || "");
    localStorage.setItem("username", user.username || "");
    localStorage.setItem("role", user.role || "");
    localStorage.setItem("name", user.name || "");

    if(user.role === "admin"){
      window.location.href = "dashboard.html";
    }else{
      window.location.href = "employee-dashboard.html";
    }

  }catch(e){
    console.log("Login error:", e);

    if (e.code === "auth/user-not-found") {
      msg.innerText = "الإيميل المرتبط بهذا المستخدم غير موجود في Firebase Auth";
    } else if (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") {
      msg.innerText = "كلمة المرور غير صحيحة";
    } else if (e.code === "auth/invalid-email") {
      msg.innerText = "الإيميل المخزن لهذا المستخدم غير صالح";
    } else {
      msg.innerText = "فشل تسجيل الدخول";
    }
  }
};

document.getElementById("password").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});

document.getElementById("username").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});
</script>

</body>
</html>
